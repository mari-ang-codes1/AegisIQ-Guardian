<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AegisIQ — Cognitive Social Engineering Shield</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide icons for professional look -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>AEGIS<span style="color: var(--accent-safe);">IQ</span> CORE</h1>
            <p>Intelligence Threat Analysis System // SOC v4.0</p>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <div id="search-bar" class="search-wrapper">
                <input type="text" id="input-field" placeholder="Enter URL or email content for deep analysis..."
                    autocomplete="off">
                <button id="scan-btn" class="scan-btn">
                    <i data-lucide="shield-alert"></i>
                    SCAN
                </button>
            </div>
        </div>

        <!-- SOC Grid -->
        <div class="dashboard-grid">
            <!-- Panel 1: Riesgo Cognitivo -->
            <div class="panel" id="panel-risk">
                <div class="panel-title">
                    <i data-lucide="brain"></i>
                    Riesgo Cognitivo
                </div>
                <div class="risk-value" id="risk-score">--%</div>
                <div style="text-align: center; color: var(--text-dim); font-size: 0.8rem;">Score de Amenaza Detectado
                </div>
            </div>

            <!-- Panel 2: Verificación Global -->
            <div class="panel" id="panel-verdict">
                <div class="panel-title">
                    <i data-lucide="globe"></i>
                    Verificación Global
                </div>
                <div style="text-align: center;">
                    <div id="threat-badge" class="threat-badge hidden">--</div>
                    <div id="threat-type" style="margin-top: 15px; font-weight: bold; color: var(--accent-cobalt);">
                        ESPERANDO INPUT...</div>
                </div>
            </div>

            <!-- Panel 3: Análisis Técnico -->
            <div class="panel" id="panel-technical">
                <div class="panel-title">
                    <i data-lucide="terminal"></i>
                    Análisis Técnico
                </div>
                <ul class="indicator-list" id="indicator-list">
                    <li style="border: none;">Sistema listo para análisis técnico.</li>
                </ul>
                <div id="recommendation-text"
                    style="margin-top: 20px; font-size: 0.85rem; color: var(--accent-safe); border-top: 1px solid #30363d; padding-top: 10px;">
                    --
                </div>
            </div>

            <!-- Panel 4: Bitácora de Incidentes -->
            <div class="panel" id="panel-logs">
                <div class="panel-title">
                    <i data-lucide="database"></i>
                    Bitácora de Incidentes
                </div>
                <div style="max-height: 200px; overflow-y: auto;">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>FECHA</th>
                                <th>VEREDICTO</th>
                                <th>RIESGO</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Logs will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
